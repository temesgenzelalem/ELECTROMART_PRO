name: electromart_pro
description: Enterprise-grade Electronics Shopping App.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Firebase Core
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_database: ^11.0.0
  firebase_messaging: ^15.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0
  firebase_performance: ^0.10.0
  firebase_remote_config: ^5.0.0
  firebase_app_check: ^0.3.0
  cloud_functions: ^5.6.2
  image_picker: ^1.0.0

  # State Management & DI
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation & UI
  go_router: ^12.1.3
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  font_awesome_flutter: ^10.6.0
  lottie: ^2.7.0
  rive: ^0.12.3

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  share_plus: ^7.2.1
  url_launcher: ^6.2.1
  path_provider: ^2.1.1
  local_auth: ^2.1.7
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  dio: ^5.3.3
  flutter_stripe: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
