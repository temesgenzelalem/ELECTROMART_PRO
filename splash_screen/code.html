<style>
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.2), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .circuit-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body-md selection:bg-secondary-container selection:text-on-secondary-container min-h-screen flex flex-col items-center justify-between overflow-hidden relative">
<!-- Background Tech Layers -->
<div class="absolute inset-0 z-0 bg-gradient-to-br from-surface-container-lowest via-background to-surface-container-low"></div>
<div class="absolute inset-0 z-0 circuit-bg opacity-40"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-secondary-container/10 blur-[120px] rounded-full pointer-events-none"></div>
<!-- Top Spacer for alignment -->
<div class="h-24 w-full"></div>
<!-- Center Logo Section -->
<main class="relative z-10 flex flex-col items-center justify-center space-y-8 px-6">
<div class="relative flex items-center justify-center group">
<!-- Glow Effect behind logo -->
<div class="absolute inset-0 bg-blue-500/20 blur-3xl rounded-full scale-150 opacity-50 group-hover:opacity-80 transition-opacity"></div>
<!-- Icon Container (Stylized E/Circuit) -->
<div class="relative w-32 h-32 flex items-center justify-center bg-surface-container-high rounded-3xl border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
<span class="material-symbols-outlined text-7xl text-tertiary select-none" data-icon="bolt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                    bolt
                </span>
<!-- Abstract 'E' Overlay -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-16 h-20 border-r-4 border-t-4 border-b-4 border-blue-400/30 rounded-r-lg translate-x-1"></div>
<div class="absolute w-8 h-1 bg-blue-400/30 -translate-x-2"></div>
</div>
</div>
</div>
<div class="text-center space-y-2">
<h1 class="font-h1 text-on-surface tracking-tighter uppercase">
                ElectroMart <span class="text-tertiary">Pro</span>
</h1>
<p class="font-label-sm text-on-primary-container tracking-[0.2em] uppercase opacity-70">
                Enterprise Procurement System
            </p>
</div>
</main>
<!-- Bottom Section -->
<footer class="relative z-10 w-full max-w-md px-10 pb-16 flex flex-col items-center space-y-10">
<!-- Progress / Shimmer Area -->
<div class="w-full space-y-4">
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden relative">
<div class="shimmer absolute inset-0 w-full h-full"></div>
<!-- Simulating active progress -->
<div class="h-full bg-secondary-container w-2/3 rounded-full shadow-[0_0_15px_rgba(5,102,217,0.5)]"></div>
</div>
<div class="flex justify-between items-center px-1">
<span class="font-code text-on-primary-container text-xs opacity-60">Initializing core modules...</span>
<span class="font-code text-on-primary-container text-xs font-semibold">v1.0.0</span>
</div>
</div>
<!-- Brand Affiliation -->
<div class="flex flex-col items-center space-y-2">
<span class="font-label-sm text-[10px] uppercase tracking-widest text-on-primary-container opacity-50">Powered by</span>
<div class="flex items-center space-x-2 grayscale opacity-60 hover:grayscale-0 hover:opacity-100 transition-all duration-500">
<span class="material-symbols-outlined text-orange-400 text-lg" data-icon="local_fire_department" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                    local_fire_department
                </span>
<span class="font-h3 text-lg font-bold text-slate-100 tracking-tight">Firebase</span>
</div>
</div>
</footer>
<!-- Decorative Corner Elements -->
<div class="absolute top-0 left-0 w-32 h-32 border-l border-t border-white/5 m-8 pointer-events-none"></div>
<div class="absolute bottom-0 right-0 w-32 h-32 border-r border-b border-white/5 m-8 pointer-events-none"></div>
